<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MORESCUE</title>
  <style>
    /* ==========================================================================
       MORESCUE Manga & Dynamic Theme (オマパン風 派手デザイン)
       ========================================================================== */
    html { scroll-behavior: smooth; }
    body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; background-color: #f4f7fb; overflow-x: hidden; }
    .mo-section { scroll-margin-top: 60px; }

    /* スマホ・PCの改行制御クラス */
    @media (min-width: 769px) { .sp-only { display: none !important; } }
    @media (max-width: 768px) { .sp-only { display: block !important; } .pc-only { display: none !important; } }

    :root {
      /* ド派手な原色カラーパレット */
      --mo-navy: #0d1b2a;
      --mo-orange: #ff3300; /* 強烈な赤オレンジ */
      --mo-yellow: #ffea00; /* 漫画風の黄色 */
      --mo-blue: #81cbf0;   /* ご指定の水色 */
      --mo-white: #ffffff;
      --mo-black: #000000;
      --mo-text: #111111;
      --mo-grad-orange: linear-gradient(135deg, #ff6600 0%, #ff0000 100%);
      --mo-manga-border: 4px solid #000; /* 漫画の太枠 */
      --mo-shadow-manga: 6px 6px 0px rgba(0,0,0,1); /* アメコミ風のベタ塗り影 */
    }
    
    .morescue-dynamic-theme { 
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', 'Meiryo', sans-serif; 
      color: var(--mo-text); line-height: 1.6; overflow-x: hidden;
    }
    .mo-container { max-width: 1000px; margin: 0 auto; padding: 0 20px; position: relative; }
    .mo-section { padding: 100px 0; position: relative; overflow: hidden; }
    .text-center { text-align: center; } 
    .text-white { color: var(--mo-white) !important; }
    .responsive-img { width: 100%; height: auto; display: block; }

    /* 漫画風の背景テクスチャ（網点ドット） */
    .mo-bg-manga-dots {
      background-color: var(--mo-blue);
      background-image: radial-gradient(#fff 15%, transparent 16%), radial-gradient(#fff 15%, transparent 16%);
      background-size: 14px 14px;
      background-position: 0 0, 7px 7px;
    }

    /* タイポグラフィ & ハイライト */
    .mo-section-title { 
      font-size: 3em; font-weight: 900; margin-bottom: 60px; line-height: 1.2; 
      color: var(--mo-white); text-shadow: 4px 4px 0 var(--mo-black), -2px -2px 0 var(--mo-black), 2px -2px 0 var(--mo-black), -2px 2px 0 var(--mo-black), 2px 2px 0 var(--mo-black);
      transform: rotate(-2deg);
    }
    
    .mo-highlight-yellow { 
      background: var(--mo-yellow); color: var(--mo-black); padding: 2px 10px; border: 2px solid var(--mo-black);
      display: inline-block; font-weight: 900; transform: rotate(1deg); box-shadow: 2px 2px 0 var(--mo-black);
    }
    .mo-highlight-red { color: var(--mo-orange); font-weight: 900; text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff; }

    /* ==========================================================================
       ド派手アニメーション（バンッ！ボヨ〜ン！）
       ========================================================================== */
    .animate-stamp { opacity: 0; transform: scale(3) rotate(-15deg); filter: blur(10px); }
    .fade-in-trigger.is-visible .animate-stamp { animation: stamp-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes stamp-in { 
      0% { opacity: 0; transform: scale(3) rotate(-15deg); filter: blur(10px); }
      70% { opacity: 1; transform: scale(0.9) rotate(2deg); filter: blur(0); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    .animate-pop-card { opacity: 0; transform: translateY(50px) scale(0.8); }
    .fade-in-trigger.is-visible .animate-pop-card { animation: pop-card 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes pop-card {
      0% { opacity: 0; transform: translateY(50px) scale(0.8); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 追従・購入ボタンの脈打ちアニメーション */
    .animate-poyon { animation: poyon 2s infinite; transform-origin: center; }
    @keyframes poyon {
      0%, 100% { transform: scale(1); }
      10% { transform: scale(1.1) rotate(2deg); }
      20% { transform: scale(0.95) rotate(-2deg); }
      30% { transform: scale(1.05) rotate(1deg); }
      40% { transform: scale(1); }
    }

    /* ヘッダー＆マーキー */
    .mo-sticky-wrapper { position: fixed; top: 0; left: 0; width: 100%; z-index: 10000; background: var(--mo-white); border-bottom: 3px solid var(--mo-black); }
    .mo-header-inner { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 10px 15px; }
    .mo-logo img { height: 40px; display: block; }
    
    .mo-nav { display: flex; align-items: center; }
    .mo-nav a { margin-left: 20px; text-decoration: none; color: var(--mo-black); font-weight: 900; font-size: 1rem; }
    .mo-nav a:hover { color: var(--mo-orange); }
    
    .mo-bg-orange-marquee { background-color: var(--mo-yellow); border-top: 2px solid var(--mo-black); color: var(--mo-black); }
    .marquee-container { padding: 5px 0; overflow: hidden; white-space: nowrap; }
    .marquee-content { display: inline-block; animation: marquee 25s linear infinite; font-weight: 900; font-size: 1.1rem; }
    .marquee-content span { padding-right: 30px; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* SPメニューボタン */
    .mo-menu-toggle { display: none; font-size: 2.5em; cursor: pointer; color: var(--mo-black); font-weight: 900; line-height: 1; transition: transform 0.3s; -webkit-tap-highlight-color: transparent; }
    .mo-menu-toggle.is-active { transform: rotate(45deg); color: var(--mo-orange); }

    /* ==========================================================================
       ファーストビュー（漫画・オマパン風ド派手化）
       ========================================================================== */
    .mo-hero { position: relative; height: 100vh; display: flex; align-items: center; justify-content: flex-start; overflow: hidden; padding-top: 80px; }
    
    /* 背景画像を画面いっぱいに */
    .mo-hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    .mo-hero-bg-img { width: 100%; height: 100%; object-fit: cover; object-position: center; }
    
    .mo-hero-container { position: relative; z-index: 3; display: flex; justify-content: flex-start; width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 5%; }
    
    /* おしゃれなカードを廃止し、文字自体に強烈なシャドウをつけて直接配置 */
    .mo-hero-text { max-width: 650px; width: 100%; text-align: left; }
    
    /* キャッチコピー：ド派手なフチドリと斜め配置 */
    .mo-hero-catch { 
      font-size: 3.5em; font-weight: 900; line-height: 1.2; color: var(--mo-white); 
      margin-bottom: 20px; transform: rotate(-3deg);
      text-shadow: 4px 4px 0 var(--mo-black), -2px -2px 0 var(--mo-black), 2px -2px 0 var(--mo-black), -2px 2px 0 var(--mo-black), 6px 6px 15px rgba(0,0,0,0.5);
    }
    
    /* サブキャッチ：黄色背景のハイライト帯 */
    .mo-hero-subcatch { 
      font-size: 1.6em; font-weight: 900; color: var(--mo-black); background: var(--mo-yellow);
      display: inline-block; padding: 5px 20px; border: 4px solid var(--mo-black);
      box-shadow: 6px 6px 0 var(--mo-black); transform: rotate(1deg); margin-bottom: 25px; line-height: 1.4;
    }
    
    /* 説明文：白背景のフキダシ風 */
    .mo-hero-desc { 
      font-size: 1.1em; font-weight: 900; color: var(--mo-text); line-height: 1.6;
      background: rgba(255,255,255,0.95); padding: 15px 25px; border: 3px solid var(--mo-black);
      border-radius: 10px; box-shadow: 4px 4px 0 var(--mo-black); margin-bottom: 35px;
      transform: rotate(-1deg);
    }
    
    /* バッジ */
    .mo-hero-badge { 
      display: inline-block; padding: 15px 40px; font-size: 1.5em; font-weight: 900; 
      border-radius: 50px; line-height: 1.2; text-align: center;
      background: var(--mo-grad-orange); color: #fff; 
      border: 4px solid var(--mo-black); box-shadow: 6px 6px 0 var(--mo-black);
      transform: rotate(-4deg);
    }

    /* 【3】 お悩み共感セクション */
    #about { position: relative; z-index: 5; padding: 100px 0; background-color: var(--mo-navy); color: #fff; }
    .overlap-grid { display: flex; gap: 25px; margin-top: 50px; }
    
    /* コマ割りカード */
    .mo-card { 
      flex: 1; background: var(--mo-white); color: var(--mo-black); border: var(--mo-manga-border); 
      padding: 40px 30px; border-radius: 10px; position: relative; 
      box-shadow: var(--mo-shadow-manga); transform: rotate(1deg);
    }
    .mo-card:nth-child(even) { transform: rotate(-1deg); }
    /* スクロールで現れた時にオレンジ枠になるアクションを定義（SP対応のためCSSアニメーション使用） */
    .fade-in-trigger.is-visible .mo-card { animation: card-highlight 2s ease forwards; }
    @keyframes card-highlight { 
      0% { border-color: #000; transform: translateY(50px); opacity: 0; }
      50% { border-color: #000; transform: translateY(0); opacity: 1; }
      100% { border-color: var(--mo-orange); transform: translateY(-5px); opacity: 1; box-shadow: 8px 8px 0 var(--mo-orange); }
    }
    
    .mo-card-number { font-size: 4em; font-weight: 900; color: var(--mo-blue); position: absolute; top: -10px; left: 15px; line-height: 1; -webkit-text-stroke: 2px #000; }
    .mo-card h3 { font-size: 1.5em; margin-bottom: 15px; font-weight: 900; border-bottom: 3px solid var(--mo-black); padding-bottom: 5px; }
    .mo-card p { font-size: 1rem; font-weight: 700; line-height: 1.6; }

    /* 【4】 解決策・特許構造セクション */
    .mo-structure-section { background: var(--mo-yellow); padding: 120px 0; border-top: 5px solid #000; border-bottom: 5px solid #000; }
    .mo-structure-diagram-wrap { position: relative; max-width: 900px; margin: 60px auto 0; padding: 20px 0; }
    .mo-center-pants { position: relative; z-index: 2; max-width: 450px; margin: 0 auto; }
    .mo-pants-img { filter: drop-shadow(10px 10px 0px rgba(0,0,0,0.8)); }
    
    /* 図解ポップアップ */
    .mo-pop-item { position: absolute; z-index: 3; width: 300px; }
    .pop-left-top { top: 0; left: -50px; } 
    .pop-right-top { top: 30%; right: -60px; } 
    .pop-bottom { bottom: -50px; left: 10%; }
    
    .pop-content { 
      background: var(--mo-white); padding: 20px; border-radius: 15px; 
      border: 4px solid var(--mo-black); box-shadow: var(--mo-shadow-manga); text-align: left; 
    }
    /* SPでスクロール時に光る */
    .fade-in-trigger.is-visible .pop-content { animation: pop-highlight 2s forwards; }
    @keyframes pop-highlight {
      80% { border-color: #000; box-shadow: 6px 6px 0 #000; transform: scale(1); }
      100% { border-color: var(--mo-orange); box-shadow: 6px 6px 0 var(--mo-orange); transform: scale(1.05); }
    }
    
    .pop-content h3 { color: var(--mo-white); background: var(--mo-orange); display: inline-block; padding: 2px 10px; border: 2px solid #000; font-size: 1.2em; margin-bottom: 10px; font-weight: 900; transform: rotate(-2deg); }
    .pop-content p { font-size: 1rem; margin: 0; font-weight: 700; line-height: 1.5; }
    
    /* 【5】 技術・機能深掘り */
    #features { padding: 120px 0; }
    .mo-feature-cards { display: flex; gap: 25px; margin-top: 50px; }
    
    .mo-feature-card { 
      flex: 1; background: #fff; border-radius: 12px; border: var(--mo-manga-border); 
      box-shadow: var(--mo-shadow-manga); text-align: left; position: relative; 
      overflow: hidden; display: flex; flex-direction: column;
    }
    /* スクロールで枠が光る */
    .fade-in-trigger.is-visible .mo-feature-card { animation: card-highlight 2s ease forwards; }
    
    .mo-feature-img { width: 100%; height: 200px; border-bottom: 4px solid var(--mo-black); background: var(--mo-blue); }
    .mo-feature-img img { width: 100%; height: 100%; object-fit: cover; }
    
    .mo-feature-text-wrap { padding: 25px; flex-grow: 1; }
    .mo-feature-title { font-size: 1.4em; color: var(--mo-navy); margin-bottom: 10px; font-weight: 900; border-bottom: 3px dotted #000; padding-bottom: 5px; }
    .mo-feature-desc { font-size: 1rem; line-height: 1.6; font-weight: 700; margin: 0; }

    /* 専門家・レビュー */
    .mo-expert-box { display: flex; align-items: stretch; gap: 40px; background: #fff; padding: 40px; border-radius: 15px; border: var(--mo-manga-border); box-shadow: var(--mo-shadow-manga); }
    .mo-expert-img-wrap { flex: 0 0 250px; border: 4px solid #000; border-radius: 10px; overflow: hidden; }
    .mo-expert-img-wrap img { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.2); }
    .mo-expert-text { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .mo-expert-title { font-size: 1.8em; font-weight: 900; margin-bottom: 15px; line-height: 1.3; }
    .mo-expert-text p { font-size: 1.1em; font-weight: 700; }
    .mo-expert-name { font-weight: 900; background: var(--mo-yellow); display: inline-block; padding: 5px 15px; border: 2px solid #000; margin-top: 20px; align-self: flex-end; }
    
    .mo-review-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-top: 40px; }
    .mo-review-item { background: #fff; color: var(--mo-black); padding: 30px; border-radius: 10px; border: var(--mo-manga-border); box-shadow: var(--mo-shadow-manga); position: relative; }
    .mo-review-item::after { content: '”'; position: absolute; top: -20px; right: 10px; font-size: 6em; color: var(--mo-yellow); font-family: sans-serif; font-weight: 900; -webkit-text-stroke: 2px #000; }
    .mo-stars { color: var(--mo-orange); letter-spacing: 2px; font-size: 1.4em; -webkit-text-stroke: 1px #000; }
    .mo-review-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
    .mo-review-avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 3px solid #000; background: var(--mo-blue); }
    .mo-review-item p { font-size: 1rem; font-weight: 700; line-height: 1.6; position: relative; z-index: 1; }

    /* 【9】 スペック・サイズ */
    #size { padding: 120px 0; background: var(--mo-light); border-top: 4px dashed #000; }
    .mo-spec-tabs { display: flex; gap: 15px; justify-content: center; margin: 0 auto 40px; max-width: 500px; }
    .mo-spec-tab { 
      flex: 1; text-align: center; cursor: pointer; 
      border: var(--mo-manga-border); border-radius: 50px; padding: 15px; background: #fff; box-shadow: 4px 4px 0 #000; font-weight: 900; font-size: 1.1em;
    }
    .mo-spec-tab.is-active { background: var(--mo-navy); color: #fff; transform: translateY(4px); box-shadow: 0 0 0 #000; }
    
    .mo-spec-content { display: none; }
    .mo-spec-content.is-active { display: block; animation: stamp-in 0.5s forwards; }

    .mo-spec-visual-flex { display: flex; gap: 40px; align-items: flex-start; background: #fff; padding: 40px; border-radius: 15px; border: var(--mo-manga-border); box-shadow: var(--mo-shadow-manga); }
    .mo-spec-img-box { flex: 0 0 300px; text-align: center; }
    .mo-spec-img-box img { width: 100%; max-width: 250px; height: auto; margin-bottom: 20px; filter: drop-shadow(5px 5px 0px rgba(0,0,0,0.5)); }
    .mo-spec-info-box { flex: 1; }

    /* 尿漏れレベルバー（漫画風） */
    .mo-level-indicator { background: var(--mo-yellow); padding: 15px; border: 3px solid #000; border-radius: 10px; margin-top: 20px; box-shadow: 3px 3px 0 #000; }
    .mo-level-label { font-weight: 900; display: block; margin-bottom: 5px; }
    .mo-level-bar { display: flex; gap: 4px; }
    .mo-level-bar span { flex: 1; height: 15px; background: #fff; border: 2px solid #000; }
    .mo-level-bar span.active { background: var(--mo-orange); }

    .mo-table { width: 100%; border-collapse: collapse; border: 3px solid #000; background: #fff; margin-bottom: 20px; }
    .mo-table th { background: var(--mo-navy); color: #fff; padding: 15px; border: 2px solid #000; font-weight: 900; } 
    .mo-table td { padding: 15px; border: 2px solid #000; text-align: center; font-weight: 700; }
    
    .mo-spec-details { background: #fff; padding: 20px; border: 3px solid #000; border-radius: 10px; box-shadow: 3px 3px 0 #000; }
    .mo-spec-details dl { margin: 0; display: flex; flex-wrap: wrap; }
    .mo-spec-details dt { width: 30%; font-weight: 900; padding: 10px 0; border-bottom: 2px dashed #ccc; }
    .mo-spec-details dd { width: 70%; margin: 0; padding: 10px 0; font-weight: 700; border-bottom: 2px dashed #ccc; }

    /* 【10】 FAQ */
    .mo-faq-item { margin-bottom: 15px; border-radius: 10px; border: 3px solid #000; box-shadow: 4px 4px 0 #000; background: #fff; }
    .mo-faq-item summary { padding: 20px 25px; font-weight: 900; cursor: pointer; position: relative; font-size: 1.1em; outline: none; }
    .mo-faq-item summary::-webkit-details-marker { display: none; }
    .mo-faq-item summary::after { content: '▼'; position: absolute; right: 20px; color: var(--mo-orange); font-weight: 900; }
    .mo-faq-item[open] summary::after { content: '▲'; }
    .mo-faq-answer { padding: 20px 25px; background: #fff; border-top: 3px dashed #000; font-weight: 700; }

    /* 購入セクション */
    .mo-buy-box { background: var(--mo-blue); padding: 50px; border-radius: 20px; border: 6px solid #000; box-shadow: 10px 10px 0 #000; max-width: 900px; margin: 0 auto; }
    .mo-buy-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; margin-bottom: 20px; }
    
    .mo-buy-item { background: #fff; padding: 30px; border-radius: 15px; border: 4px solid #000; text-align: center; box-shadow: 6px 6px 0 #000; }
    .mo-buy-item img { height: 180px; object-fit: contain; margin-bottom: 20px; filter: drop-shadow(5px 5px 0 rgba(0,0,0,0.3)); }
    .mo-buy-item h4 { font-size: 1.5
