<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MORESCUE - 究極のレスキューパンツ</title>
  <style>
    /* ==========================================================================
       MORESCUE - LIMIT BREAK COMIC DYNAMIC THEME (V8 - Perfect Unified)
       ========================================================================== */
    @import url('https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght=700;900&family=Noto+Sans+JP:wght=700;900&display=swap');

    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; 
      font-family: 'M PLUS 1p', 'Noto Sans JP', sans-serif;
      background-color: #f2f9fc;
      color: #111;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    @media (min-width: 769px) { .sp-only { display: none !important; } }
    @media (max-width: 768px) { .sp-only { display: block !important; } .pc-only { display: none !important; } }

    /* カラーパレット */
    :root {
      --c-main: #81cbf0;       
      --c-main-dark: #5eb5e3;  
      --c-yellow: #ffecb3;     
      --c-accent: #ff8a65;     
      --c-dark: #1e3a5f;       
      --c-white: #ffffff;
      
      --bg-halftone-blue: radial-gradient(var(--c-main-dark) 10%, transparent 11%), radial-gradient(var(--c-main-dark) 10%, transparent 11%);
      --bg-halftone-dark: radial-gradient(rgba(30, 58, 95, 0.08) 15%, transparent 16%), radial-gradient(rgba(30, 58, 95, 0.08) 15%, transparent 16%);
      
      --shadow-sm: 4px 4px 0px var(--c-dark);
      --shadow-md: 8px 8px 0px var(--c-dark);
      --shadow-lg: 12px 12px 0px var(--c-dark);
      
      --border-thick: 4px solid var(--c-dark);
    }

    .mo-container { max-width: 1000px; margin: 0 auto; padding: 0 20px; position: relative; }
    .mo-section { padding: 120px 0; position: relative; overflow: hidden; }
    .text-center { text-align: center; } 
    img { max-width: 100%; height: auto; }

    /* ==========================================================================
       カード（元吹き出し）の完全統一スタイルクラス
       ========================================================================== */
    .unified-card {
      background: var(--c-white);
      border: var(--border-thick);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      color: var(--c-dark);
    }

    /* ==========================================================================
       共通見出し（FVの「あ、っと思った」デザインに完全統一）
       ========================================================================== */
    .section-title-card { 
      display: inline-flex; align-items: center; justify-content: center;
      position: relative; margin-bottom: 60px; transform: rotate(-2deg); 
      background: var(--c-white); border: var(--border-thick); border-radius: 20px;
      padding: 20px 40px; box-shadow: var(--shadow-lg); 
      max-width: 95%; box-sizing: border-box;
    }
    .section-title {
      font-size: clamp(1.6rem, 4vw, 3rem); 
      font-weight: 900; color: var(--c-dark); line-height: 1.4; margin: 0; text-align: center;
      letter-spacing: 0.05em;
    }
    .section-title .hl { color: var(--c-accent); }
    
    @media (max-width: 768px) {
      .section-title-card { padding: 15px 20px; margin-bottom: 40px; border-radius: 16px; }
      .section-title { font-size: clamp(1.4rem, 5vw, 2.2rem); }
    }

    /* ==========================================================================
       ボタンデザイン統一
       ========================================================================== */
    .btn-sync {
      background: var(--c-accent); color: #fff !important;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50px; text-decoration: none; font-weight: 900;
      border: 4px solid var(--c-white); box-shadow: 0 10px 20px rgba(30,58,95,0.4);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer; box-sizing: border-box; letter-spacing: 0.05em;
    }
    .btn-sync:hover {
      transform: scale(1.05) translateY(-3px); 
      box-shadow: 0 15px 25px rgba(30,58,95,0.5); background: #ff7043;
    }
    .btn-sync .btn-icon { filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.2)); }
    
    .header-buy-btn { padding: 6px 16px 6px 12px; border-width: 3px; }
    .header-buy-btn .btn-icon { height: 22px; margin-right: 6px; }
    .header-buy-btn .btn-text { font-size: 1rem; }

    .main-buy-btn { padding: 12px 30px 12px 20px; }
    .main-buy-btn .btn-icon { height: 40px; margin-right: 12px; }
    .main-buy-btn .btn-text { font-size: 1.3rem; }
    .content-buy-btn { width: 100%; margin-top: 20px; }

    /* アニメーション */
    .anim-slide-up { opacity: 0; transform: translateY(50px); transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .is-visible .anim-slide-up { opacity: 1; transform: translateY(0); }
    .anim-zoom-in { opacity: 0; transform: scale(0.5) rotate(-5deg); transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .is-visible .anim-zoom-in { opacity: 1; transform: scale(1) rotate(0); }
    .animate-float { animation: float-img 3s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite alternate; }
    @keyframes float-img { 0% { transform: translateY(0px) rotate(0deg); } 100% { transform: translateY(-20px) rotate(2deg); } }

    /* ==========================================================================
       ヘッダー＆マーキー
       ========================================================================== */
    .mo-sticky-wrapper { position: fixed; top: 0; left: 0; width: 100%; z-index: 10000; }
    .mo-header { background: var(--c-white); border-bottom: var(--border-thick); display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; box-shadow: 0 4px 0 rgba(30,58,95,0.1); }
    .mo-logo img { height: 35px; display: block; }
    
    .mo-nav { display: flex; align-items: center; gap: 20px; }
    .mo-nav a.nav-link { text-decoration: none; color: var(--c-dark); font-weight: 900; font-size: 1rem; border-bottom: 3px solid transparent; transition: 0.2s; }
    .mo-nav a.nav-link:hover { border-color: var(--c-accent); color: var(--c-accent); }
    .mo-menu-toggle { display: none; }

    .mo-marquee { background: var(--c-main); color: var(--c-white); border-bottom: var(--border-thick); padding: 8px 0; overflow: hidden; white-space: nowrap; }
    .marquee-content { display: inline-block; animation: marquee 25s linear infinite; font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; }
    .marquee-content span { padding-right: 30px; display: inline-flex; align-items: center; text-shadow: none; }
    .marquee-pants { height: 1.2em; vertical-align: middle; margin: 0 10px; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* ==========================================================================
       ファーストビュー（HV）- 完全特化配置
       ========================================================================== */
    .hv-section {
      height: 100vh; min-height: 850px;
      display: flex; align-items: flex-end; /* コンテンツを下側に寄せる */
      justify-content: center;
      position: relative; overflow: hidden;
      border-bottom: 8px solid var(--c-dark);
      padding-bottom: 40px; /* 下部余白 */
      padding-top: 150px;   /* 修正：上部余白をさらに増やして顔を解放 */
    }
    
    .mo-hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: var(--c-main); overflow: hidden; }
    .bg-slide {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center top; /* モデルの顔（上部）が切れないように基準をTopに */
      opacity: 0; animation: slideCrossFade 15s infinite;
    }
    .bg-slide:nth-child(1) { animation-delay: 0s; }
    .bg-slide:nth-child(2) { animation-delay: 5s; }
    .bg-slide:nth-child(3) { animation-delay: 10s; }
    
    @keyframes slideCrossFade {
      0% { opacity: 0; transform: scale(1); }
      10%, 33% { opacity: 1; transform: scale(1.02); }
      43%, 100% { opacity: 0; transform: scale(1.05); }
    }

    .mo-hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-halftone-dark); background-size: 10px 10px; opacity: 0.2; z-index: 2; pointer-events: none; }
    .hv-flash { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200vw; height: 200vw; background: repeating-conic-gradient(from 0deg, rgba(255,255,255,0.1) 0deg 10deg, transparent 10deg 20deg); z-index: 3; animation: spinFlash 120s linear infinite; pointer-events: none; }

    .hv-content-wrap { position: relative; z-index: 5; width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none; }
    .hv-content-wrap > * { pointer-events: auto; }

    /* ====================================
       上からバンッ！と降ってくるループアニメーション
       ==================================== */
    .hv-catch-bubble {
      padding: 40px 35px; max-width: 95%; width: fit-content; position: relative;
      opacity: 0; animation: loopBam1 12s infinite; transform-origin: center;
      margin-left: -200px; /* 修正：キャッチを左へずらす */
      margin-bottom: 10px; /* 修正：下部余白調整 */
    }
    .hv-catch { 
      font-size: clamp(1.6rem, 4vw, 3rem); 
      font-weight: 900; line-height: 1.3; margin: 0; 
    }
    .typo-line { display: block; white-space: nowrap; width: 100%; text-align: left; }
    .hv-catch span.hl { color: var(--c-accent); }

    .hv-product-card {
      padding: 30px; max-width: 420px; position: relative; display: flex; flex-direction: column; align-items: center;
      opacity: 0; animation: loopBam2 12s infinite; transform-origin: center;
      margin-right: -200px; /* 修正：商品カードを右へずらす */
      margin-bottom: 10px; /* 修正：下部余白調整 */
    }
    .hv-product-img { width: 180px; margin-bottom: 20px; filter: drop-shadow(0 10px 10px rgba(30,58,95,0.3)); transform: rotate(-5deg); }
    .hv-product-text { border: 2px solid var(--c-dark); background: #f9f9f9; padding: 15px; border-radius: 10px; font-size: 1rem; font-weight: 700; line-height: 1.6; text-align: left; }
    .hv-product-text strong { color: var(--c-accent); font-size: 1.3rem; display: block; margin-bottom: 8px; line-height: 1.3; }

    .hv-badge {
      position: absolute; top: -40px; right: -30px;
      background: var(--c-accent); color: var(--c-white);
      width: 150px; height: 150px; border-radius: 50%; border: var(--border-thick);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      box-shadow: var(--shadow-sm); transform: rotate(15deg); line-height: 1.1;
    }
    .hv-badge span.small { font-size: 1rem; font-weight: 900; }
    .hv-badge span.big { font-size: 2rem; font-weight: 900; color: var(--c-yellow); }

    @keyframes loopBam1 {
      0% { opacity: 0; transform: translateY(-300px) scale(0.5) rotate(15deg); }
      4% { opacity: 1; transform: translateY(20px) scale(1.05) rotate(-3deg); }
      6% { transform: translateY(-10px) scale(0.98) rotate(1deg); }
      8% { transform: translateY(0) scale(1) rotate(0); }
      88% { opacity: 1; transform: translateY(0) scale(1) rotate(0); }
      92% { opacity: 1; transform: translateY(-20px) scale(1.05) rotate(-3deg); }
      95%, 100% { opacity: 0; transform: translateY(300px) scale(0.5) rotate(15deg); }
    }
    @keyframes loopBam2 {
      0%, 8% { opacity: 0; transform: translateY(-300px) scale(0.5) rotate(-15deg); }
      12% { opacity: 1; transform: translateY(20px) scale(1.05) rotate(3deg); }
      14% { transform: translateY(-10px) scale(0.98) rotate(-1deg); }
      16% { transform: translateY(0) scale(1) rotate(0); }
      88% { opacity: 1; transform: translateY(0) scale(1) rotate(0); }
      92% { opacity: 1; transform: translateY(-20px) scale(1.05) rotate(3deg); }
      95%, 100% { opacity: 0; transform: translateY(300px) scale(0.5) rotate(-15deg); }
    }

    /* ==========================================================================
       お悩み共感セクション
       ========================================================================== */
    #about { 
      background-color: var(--c-white);
      background-image: var(--bg-halftone-dark); background-size: 20px 20px; background-position: 0 0, 10px 10px;
      border-bottom: 8px solid var(--c-dark); 
    }
    
    .mo-card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 40px; }
    .comic-card { background: var(--c-white); border: var(--border-thick); box-shadow: var(--shadow-md); padding: 40px 30px; position: relative; transform: rotate(-1deg); transition: 0.2s; border-radius: 12px; }
    .comic-card:nth-child(even) { transform: rotate(1.5deg); background: #f9f9f9; }
    .comic-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: var(--shadow-lg); border-color: var(--c-main); }
    
    .card-num { position: absolute; top: -20px; left: -20px; background: var(--c-dark); color: var(--c-white); font-size: 2rem; font-weight: 900; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border: var(--border-thick); box-shadow: var(--shadow-sm); transform: rotate(-10deg); border-radius: 10px;}
    .comic-card h3 { font-size: 1.5rem; font-weight: 900; margin-bottom: 15px; border-bottom: 3px solid var(--c-dark); padding-bottom: 10px; color: var(--c-accent); }
    .comic-card p { font-size: 1.05rem; font-weight: 700; line-height: 1.6; margin: 0; }

    /* ==========================================================================
       特許構造セクション
       ========================================================================== */
    #structure { background: var(--c-yellow); border-bottom: 8px solid var(--c-dark); }
    .structure-wrapper { position: relative; max-width: 800px; margin: 0 auto; text-align: center; }
    .pants-center-img { max-width: 400px; margin: 0 auto; border: var(--border-thick); box-shadow: var(--shadow-lg); border-radius: 20px; background: var(--c-white); padding: 30px; transform: rotate(-2deg); }
    
    .comic-pop {
      position: absolute; padding: 20px; font-weight: 700; width: 260px; text-align: left; opacity: 0; 
    }
    .pop-1 { top: 10%; left: -120px; }
    .pop-2 { top: 40%; right: -120px; }
    .pop-3 { bottom: -40px; left: 50%; margin-left: -160px; width: 320px; }
    
    .comic-pop h4 { font-size: 1.3rem; margin: 0 0 10px; font-weight: 900; border-bottom: 2px dashed var(--c-dark); padding-bottom: 5px; color: var(--c-accent); }

    .pop-loop-1 { animation: popLoop1 10s infinite cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: center; }
    .pop-loop-2 { animation: popLoop2 10s infinite cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: center; }
    .pop-loop-3 { animation: popLoop3 10s infinite cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: center; }

    @keyframes popLoop1 {
      0% { opacity: 0; transform: translateY(-200px) scale(0.5) rotate(-20deg); }
      5% { opacity: 1; transform: translateY(10px) scale(1.05) rotate(5deg); }
      8% { transform: translateY(0) scale(1) rotate(-1deg); }
      85% { opacity: 1; transform: translateY(0) scale(1) rotate(-1deg); }
      88% { opacity: 1; transform: translateY(-10px) scale(1.05) rotate(5deg); }
      92%, 100% { opacity: 0; transform: translateY(200px) scale(0.5) rotate(-20deg); }
    }
    @keyframes popLoop2 {
      0%, 10% { opacity: 0; transform: translateY(-200px) scale(0.5) rotate(20deg); }
      15% { opacity: 1; transform: translateY(10px) scale(1.05) rotate(-5deg); }
      18% { transform: translateY(0) scale(1) rotate(1deg); }
      85% { opacity: 1; transform: translateY(0) scale(1) rotate(1deg); }
      88% { opacity: 1; transform: translateY(-10px) scale(1.05) rotate(-5deg); }
      92%, 100% { opacity: 0; transform: translateY(200px) scale(0.5) rotate(20deg); }
    }
    @keyframes popLoop3 {
      0%, 20% { opacity: 0; transform: translateY(-200px) scale(0.5) rotate(0deg); }
      25% { opacity: 1; transform: translateY(10px) scale(1.05) rotate(0deg); }
      28% { transform: translateY(0) scale(1) rotate(0deg); }
      85% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      88% { opacity: 1; transform: translateY(-10px) scale(1.05) rotate(0deg); }
      92%, 100% { opacity: 0; transform: translateY(200px) scale(0.5) rotate(0deg); }
    }

    /* ==========================================================================
       SP用 レスポンシブ (SP特化配置)
       ========================================================================== */
    @media (max-width: 768px) {
      /* HV スマホ */
      .hv-section { padding-top: 60px; height: 100vh; height: 100svh; align-items: flex-end; padding-bottom: 30px; }
      
      .bg-slide { top: 0; height: 100%; }

      /* 修正：SP上部余白を大きく取り、下部に要素をまとめる */
      .hv-content-wrap { padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: auto; padding-top: 65svh; }

      .hv-catch-bubble { padding: 25px 20px; max-width: 95%; margin: 0 auto 10px; transform: rotate(0); margin-left: 0; /* PCの左ずれをSPでリセット */ }
      .hv-catch { text-align: center; } 
      
      .hv-product-card { max-width: 90%; margin: 0 auto 10px; padding: 20px; transform: rotate(0); margin-right: 0; /* PCの右ずれをSPでリセット */ }
      .hv-product-img { width: 130px; margin-bottom: 10px; }
      .hv-product-text { font-size: 0.85rem; padding: 10px; }
      .hv-product-text strong { font-size: 1.1rem; }
    }
  </style>
</head>
